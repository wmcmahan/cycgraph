name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  # Test on the declared engine floor (Node 22 LTS) so CI proves the packages
  # actually run there — anything newer (24+) is forward-compatible.
  NODE_VERSION: '22'

jobs:
  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Build all workspaces
        run: npm run build

      - name: Lint all workspaces
        run: npm run lint

      - name: TypeScript strict check (orchestrator)
        run: npx tsc --noEmit
        working-directory: packages/orchestrator

  test-orchestrator:
    name: Test Orchestrator
    runs-on: ubuntu-latest
    needs: lint-and-build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci
      - run: npm run build --workspace=packages/orchestrator

      # --coverage enforces the thresholds in vitest.config.ts (a regression
      # ratchet on src/runner and src/agent); a coverage drop fails the job.
      - name: Run orchestrator tests (with coverage thresholds)
        run: npx vitest run --coverage
        working-directory: packages/orchestrator

  test-orchestrator-postgres:
    name: Test Orchestrator Postgres
    runs-on: ubuntu-latest
    needs: lint-and-build
    # Real Postgres (with pgvector) so the Drizzle adapter, durable event log,
    # and the SKIP-LOCKED queue + fencing tests actually run instead of skipping.
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: mcai
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        # Wait until the server accepts connections before the job's steps run.
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/mcai
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci
      # orchestrator + memory are workspace deps the adapter and its tests import.
      - run: npm run build --workspace=packages/orchestrator --workspace=packages/memory

      # The pgvector image ships the extension but a `services:` container does
      # NOT auto-run init.sql (no volume mount), and no migration creates the
      # extension — so create it here before migrating. `psql` is preinstalled
      # on the GitHub ubuntu runner.
      - name: Enable pgvector extension
        run: psql "$DATABASE_URL" -c 'CREATE EXTENSION IF NOT EXISTS vector;'

      - name: Apply migrations
        run: npm run migrate --workspace=packages/orchestrator-postgres

      # No --passWithNoTests: with DATABASE_URL set, the 66 previously-skipped
      # integration tests must run (and pass), not silently no-op.
      - name: Run orchestrator-postgres tests
        run: npx vitest run
        working-directory: packages/orchestrator-postgres

  # ── Tenant Isolation Gate ──────────────────────────────────────────────
  # A NAMED, required release gate (mark it required in branch protection):
  # runs the cross-tenant isolation + RLS suite against a real pgvector DB with
  # all tenancy migrations (0017–0019) applied. ISOLATION_GATE=1 makes the suite
  # fail loudly if it can't reach the DB instead of silently skipping — so a
  # broken isolation guarantee (or an accidentally-skipped suite) fails the gate.
  tenant-isolation-gate:
    name: Tenant Isolation Gate
    runs-on: ubuntu-latest
    needs: lint-and-build
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: mcai
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/mcai
      ISOLATION_GATE: '1'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run build --workspace=packages/orchestrator --workspace=packages/memory
      - name: Enable pgvector extension
        run: psql "$DATABASE_URL" -c 'CREATE EXTENSION IF NOT EXISTS vector;'
      - name: Apply tenancy migrations (0017–0019 included)
        run: npm run migrate --workspace=packages/orchestrator-postgres
      # Explicit file + no --passWithNoTests: a deleted/renamed suite fails the
      # gate; ISOLATION_GATE=1 fails it if the DB-backed tests would skip.
      - name: Run cross-tenant isolation suite
        run: npx vitest run test/tenancy-isolation.test.ts
        working-directory: packages/orchestrator-postgres

  test-memory:
    name: Test Memory
    runs-on: ubuntu-latest
    needs: lint-and-build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci
      - run: npm run build --workspace=packages/memory

      - name: Run memory tests (with coverage thresholds)
        run: npx vitest run --coverage
        working-directory: packages/memory

  test-context-engine:
    name: Test Context Engine
    runs-on: ubuntu-latest
    needs: lint-and-build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci
      - run: npm run build --workspace=packages/context-engine

      - name: Run context-engine tests (with coverage thresholds)
        run: npx vitest run --coverage
        working-directory: packages/context-engine

  evals-unit-tests:
    # Tests the eval harness itself — drift calculator, baseline persistence,
    # SUT dispatcher, multi-sample wrapper, recording planner, etc. Does NOT
    # invoke the harness against the other packages; that's the deterministic
    # gate below.
    name: Evals — Unit Tests
    runs-on: ubuntu-latest
    needs: lint-and-build
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Run evals unit tests
        run: npx vitest run
        working-directory: packages/evals

  evals-deterministic-gate:
    # Runs the harness against the real @cycgraph/memory, @cycgraph/context-engine,
    # and integration deterministic tracks. No LLM — pure library calls.
    # Catches regressions in segmentation, dedup, budget enforcement, temporal
    # filtering, subgraph extraction, conflict detection, and cross-package
    # integration. Exit code 1 (drift gate fail) hard-fails the job.
    name: Evals — Deterministic Gate
    runs-on: ubuntu-latest
    needs: lint-and-build
    steps:
      - uses: actions/checkout@v4
        with:
          # Defensive: the golden datasets are small SQLite blobs committed
          # directly today, but `lfs: true` keeps this job correct if/when
          # the goldens migrate to LFS storage.
          lfs: true

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Run deterministic eval gate
        run: npm run evals --workspace=packages/evals -- --deterministic-only

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      # Fail on high+critical vulnerabilities in production dependencies.
      # Dev-only advisories are reported but don't block the build (they don't
      # ship to users). This replaces the previous `|| true` swallow which
      # silenced even critical issues.
      - name: Audit production dependencies (fail on high/critical)
        run: npm audit --omit=dev --audit-level=high

      - name: Audit dev dependencies (report only)
        run: npm audit --include=dev || true

  integration-smoke:
    name: Cross-Package Integration Smoke
    runs-on: ubuntu-latest
    needs: lint-and-build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci
      - run: npm run build

      # Exercise the public API across packages so a breaking change to one
      # package's barrel export is caught here rather than at consumer install.
      - name: Run cross-package integration smoke
        run: npx tsx scripts/integration-smoke.ts
